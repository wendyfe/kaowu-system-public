<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考务报名管理系统</title>
    <!-- 引入 Bootstrap CDN（无需本地依赖，快速美化） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 自定义考务系统风格样式 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(120deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 2rem 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.12);
        }
        .btn-custom {
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
        }
        .btn-custom:hover {
            background: #2980b9;
            color: white;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header text-center">
        <div class="container">
            <h1 class="mb-3">考务报名管理系统</h1>
            <p class="lead">高效管理 · 便捷报名 · 智能审核</p>
        </div>
    </header>

    <!-- 主体内容 -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center gap-4">
            <!-- 管理员入口卡片 -->
            <div class="col-md-5 col-lg-4">
                <div class="card p-5 text-center">
                    <h3 class="card-title mb-4">管理员入口</h3>
                    <p class="text-muted mb-4">管理报名信息、审核报名申请、发送通知</p>
                    <a href="/admin" class="btn btn-custom w-100">进入管理后台</a>
                </div>
            </div>
            <!-- 考生报名卡片 -->
            <div class="col-md-5 col-lg-4">
                <div class="card p-5 text-center">
                    <h3 class="card-title mb-4">学生报名入口</h3>
                    <p class="text-muted mb-4">填写报名信息、查询审核状态、取消报名</p>
                    <a href="/student" class="btn btn-custom w-100">立即报名</a>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="bg-dark text-white text-center py-3 fixed-bottom">
        <div class="container">
            <p class="mb-0">© 2026 考务报名管理系统 - 所有权利保留</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
