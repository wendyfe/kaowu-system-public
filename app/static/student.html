<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考务工作人员报名 - 考务报名管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

    <!-- Toast 提示容器 -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
            </div>
        </div>
    </div>

    <header class="header text-center">
        <div class="container">
            <h1 class="mb-3">考务报名管理系统</h1>
            <p class="lead">学生报名入口</p>
        </div>
    </header>

    <div class="container mt-5 mb-5">
        <div class="tip">
            学号8位数字，手机号11位数字，QQ号纯数字（用于接收取消报名验证码）
        </div>

        <div class="card p-5 mb-4">
            <h3 class="mb-4">报名入口</h3>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">考试项目</label>
                    <select name="recruitment_id" id="examSelect" class="form-select" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">学号</label>
                    <input type="text" name="student_id" class="form-control" required placeholder="8位数字">
                </div>
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="tel" name="phone" class="form-control" required placeholder="11位数字">
                </div>
                <div class="mb-3">
                    <label class="form-label">QQ号</label>
                    <input type="text" name="qq" class="form-control" required placeholder="纯数字，用于接收验证码">
                </div>
                <div class="mb-4">
                    <label class="form-label d-block">是否有经验</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="has_experience" value="true" required>
                        <label class="form-check-label">有</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="has_experience" value="false" checked>
                        <label class="form-check-label">无</label>
                    </div>
                </div>
                <button type="submit" class="btn-custom w-100">提交报名</button>
            </form>
        </div>

        <!-- 考场布置视频 -->
        <div class="card p-5 mb-4">
            <h3 class="mb-4">📹 考场布置要求视频</h3>
            <p class="text-muted mb-3" style="font-size:14px;">请认真观看，了解考场布置规范和注意事项</p>
            <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;margin-bottom:16px;">
                <iframe id="pageBilibiliPlayer" style="position:absolute;top:0;left:0;width:100%;height:100%;"
                        src="" scrolling="no" border="0" frameborder="0"
                        allowfullscreen="true" >
                </iframe>
            </div>
            <div id="videoWatchForm" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">学号</label>
                    <input type="text" id="videoStudentId" class="form-control" placeholder="8位数字">
                </div>
                <div class="col-md-3">
                    <label class="form-label">姓名</label>
                    <input type="text" id="videoName" class="form-control" placeholder="姓名">
                </div>
                <div class="col-md-3">
                    <label class="form-label">手机号</label>
                    <input type="text" id="videoPhone" class="form-control" placeholder="11位数字">
                </div>
                <div class="col-md-3">
                    <button type="button" id="pageConfirmWatchedBtn" class="btn btn-success w-100">✅ 确认已完成观看</button>
                </div>
            </div>
            <div id="videoWatchResult" class="mt-2" style="display:none;"></div>
        </div>

        <div class="card p-5">
            <h3 class="mb-4">查询我的报名记录</h3>
            <form id="myRegForm" class="mb-4">
                <div class="mb-3">
                    <label class="form-label">学号</label>
                    <input type="text" id="myStudentId" class="form-control" placeholder="8位数字学号" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="text" id="myPhone" class="form-control" placeholder="11位数字手机号" required>
                </div>
                <button type="submit" class="btn-custom w-100">查询</button>
            </form>
            <div id="myList"></div>
        </div>
    </div>

    <!-- 取消报名弹窗 -->
    <div class="modal fade" id="cancelModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">取消报名验证</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="cancelRegId">
                    <div class="mb-3">
                        <label class="form-label">QQ邮箱验证码</label>
                        <input type="text" id="verifyCode" class="form-control" placeholder="输入收到的6位验证码" required>
                    </div>
                    <button type="button" id="sendCodeBtn" class="btn-custom w-100 mb-3">发送验证码到QQ邮箱</button>
                    <button type="button" id="confirmCancelBtn" class="btn-custom w-100">确认取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 报名成功弹窗（含视频） -->
    <div class="modal fade" id="qqGroupModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="border-radius:16px;">
                <div class="modal-body text-center py-4 px-4">
                    <div style="font-size:48px;margin-bottom:12px;">✅</div>
                    <h4 class="mb-2">报名成功！</h4>
                    <p class="text-muted mb-3" id="qqGroupExamName" style="font-size:15px;"></p>

                    <!-- 视频区域 -->
                    <div id="modalVideoSection" class="mb-3" style="display:none;">
                        <p class="text-muted mb-2" style="font-size:14px;">📹 请观看考场布置要求视频</p>
                        <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;">
                            <iframe id="modalBilibiliPlayer" style="position:absolute;top:0;left:0;width:100%;height:100%;"
                                    src="" scrolling="no" border="0" frameborder="0"
                                    allowfullscreen="true" >
                            </iframe>
                        </div>
                        <div class="mt-2 d-flex justify-content-center align-items-center gap-2">
                            <button type="button" id="modalConfirmWatchedBtn" class="btn btn-outline-success btn-sm">✅ 我已完成观看</button>
                            <span id="modalWatchedBadge" class="badge bg-success" style="display:none;">已记录</span>
                        </div>
                    </div>

                    <div style="background:#e8f5e9;border-radius:12px;padding:16px;margin-bottom:16px;">
                        <div style="font-size:14px;color:#2e7d32;margin-bottom:6px;">📢 请加入考务工作QQ群</div>
                        <div id="qqGroupNumber" style="font-size:28px;font-weight:bold;color:#1565c0;letter-spacing:2px;"></div>
                        <div style="font-size:13px;color:#666;margin-top:6px;">后续通知将通过群消息发布</div>
                    </div>
                    <button type="button" id="qqGroupDismissBtn" class="btn btn-primary btn-lg px-5">知道了</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="mb-0">© 2026 考务报名管理系统 - 所有权利保留</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toast 提示工具函数
        function showToast(message, type) {
            const toastEl = document.getElementById('toast');
            const toastBody = document.getElementById('toastMessage');
            toastBody.textContent = message;
            toastEl.className = 'toast align-items-center border-0 text-bg-' + (type || 'info');
            bootstrap.Toast.getOrCreateInstance(toastEl).show();
        }

        // ========== 视频 + QQ群弹窗 ==========
        let qqGroupModalInstance = null;

        function showQQGroupModal(qqGroup, videoUrl) {
            if (!qqGroupModalInstance) {
                qqGroupModalInstance = new bootstrap.Modal(document.getElementById('qqGroupModal'), { backdrop: 'static', keyboard: false });
            }

            const examSelect = document.getElementById('examSelect');
            const selectedOpt = examSelect.options[examSelect.selectedIndex];
            const examName = selectedOpt ? selectedOpt.textContent.split('（')[0] : '';
            document.getElementById('qqGroupExamName').textContent = `「${examName}」`;
            document.getElementById('qqGroupNumber').textContent = qqGroup;

            const videoSection = document.getElementById('modalVideoSection');
            const confirmBtn = document.getElementById('modalConfirmWatchedBtn');
            const badge = document.getElementById('modalWatchedBadge');

            if (videoUrl) {
                videoSection.style.display = 'block';
                document.getElementById('modalBilibiliPlayer').src = videoUrl;
                confirmBtn.style.display = 'inline-block';
                badge.style.display = 'none';
            } else {
                videoSection.style.display = 'none';
            }

            qqGroupModalInstance.show();
        }

        // 弹窗关闭按钮
        document.getElementById('qqGroupDismissBtn').addEventListener('click', function() {
            if (qqGroupModalInstance) qqGroupModalInstance.hide();
        });

        // 弹窗内确认观看
        document.getElementById('modalConfirmWatchedBtn').addEventListener('click', function() {
            const studentId = formInputValues.student_id;
            const name = formInputValues.name;
            const phone = formInputValues.phone;
            if (!studentId || !name || !phone) {
                showToast('报名信息缺失，请重新报名', 'warning');
                return;
            }
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('name', name);
            formData.append('phone', phone);
            const btn = document.getElementById('modalConfirmWatchedBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            fetch('/api/mark-video-watched', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 0) {
                        btn.style.display = 'none';
                        document.getElementById('modalWatchedBadge').style.display = 'inline';
                        showToast('观看记录已保存', 'success');
                    } else {
                        showToast(data.detail || '确认失败', 'danger');
                        btn.disabled = false;
                        btn.textContent = '✅ 我已完成观看';
                    }
                });
        });

        // 弹窗关闭时清理
        document.getElementById('qqGroupModal').addEventListener('hidden.bs.modal', function() {
            document.getElementById('modalBilibiliPlayer').src = '';
            document.getElementById('modalConfirmWatchedBtn').style.display = 'inline-block';
            document.getElementById('modalConfirmWatchedBtn').disabled = false;
            document.getElementById('modalConfirmWatchedBtn').textContent = '✅ 我已完成观看';
            document.getElementById('modalWatchedBadge').style.display = 'none';
        });

        // ========== 独立视频区确认观看 ==========
        document.getElementById('pageConfirmWatchedBtn').addEventListener('click', function() {
            const studentId = document.getElementById('videoStudentId').value.trim();
            const name = document.getElementById('videoName').value.trim();
            const phone = document.getElementById('videoPhone').value.trim();
            if (!studentId || !name || !phone) {
                showToast('请填写学号、姓名和手机号', 'warning');
                return;
            }
            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('name', name);
            formData.append('phone', phone);
            const btn = document.getElementById('pageConfirmWatchedBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            fetch('/api/mark-video-watched', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    if (data.code === 0) {
                        const result = document.getElementById('videoWatchResult');
                        result.style.display = 'block';
                        result.innerHTML = `<div class="alert alert-success py-2 mb-0">✅ 观看记录已保存（${data.watched_at || '已记录'}）</div>`;
                        btn.disabled = false;
                        btn.textContent = '✅ 确认已完成观看';
                        showToast('观看记录已保存', 'success');
                    } else {
                        showToast(data.detail || '确认失败', 'danger');
                        btn.disabled = false;
                        btn.textContent = '✅ 确认已完成观看';
                    }
                });
        });

        // ========== 初始化视频 URL ==========
        function loadVideoUrl() {
            fetch('/api/video-url')
                .then(r => r.json())
                .then(data => {
                    if (data.video_url) {
                        document.getElementById('pageBilibiliPlayer').src = data.video_url;
                    }
                });
        }

        // 修复：全局变量保存用户已选中的考试ID和表单输入值
        let selectedExamId = '';
        let formInputValues = {
            student_id: '',
            name: '',
            phone: '',
            qq: '',
            has_experience: 'false'
        };

        // 修复：优化loadExamList，保留用户输入状态
        async function loadExamList() {
            try {
                const res = await fetch("/api/recruit/list");
                const list = await res.json();
                const select = document.getElementById("examSelect");

                // 1. 保存当前选中状态（刷新前）
                const currentSelectedId = select.value || selectedExamId;

                // 2. 刷新下拉框选项
                select.innerHTML = "<option value=''>请选择考试</option>";
                list.forEach(item => {
                    const opt = document.createElement("option");
                    opt.value = item.id;
                    opt.textContent = `${item.exam_name}（需${item.need_num}人/剩${item.remaining}人，截止：${item.end_time}）`;
                    select.appendChild(opt);
                });

                // 3. 恢复选中状态（如果该考试仍存在）
                if (currentSelectedId) {
                    const optionExists = Array.from(select.options).some(opt => opt.value === currentSelectedId);
                    if (optionExists) {
                        select.value = currentSelectedId;
                        selectedExamId = currentSelectedId;
                    } else {
                        // 考试已被删除/关闭，提示用户
                        selectedExamId = '';
                        showToast("你选中的考试项目已失效，请重新选择", 'warning');
                    }
                }

                // 4. 恢复表单输入值
                document.querySelector('input[name="student_id"]').value = formInputValues.student_id;
                document.querySelector('input[name="name"]').value = formInputValues.name;
                document.querySelector('input[name="phone"]').value = formInputValues.phone;
                document.querySelector('input[name="qq"]').value = formInputValues.qq;
                document.querySelector(`input[name="has_experience"][value="${formInputValues.has_experience}"]`).checked = true;

            } catch (err) {
                console.error("加载考试列表失败:", err);
                showToast("加载考试列表失败，请刷新页面", 'danger');
            }
        }

        // 修复：监听表单输入，实时保存值
        function initFormInputListener() {
            const examSelect = document.getElementById("examSelect");
            if (examSelect) {
                examSelect.addEventListener('change', function () {
                    selectedExamId = this.value;
                });
            } else {
                console.warn("未找到 #examSelect");
            }

            const studentIdInput = document.querySelector('input[name="student_id"]');
            if (studentIdInput) studentIdInput.addEventListener('input', e => formInputValues.student_id = e.target.value);

            const nameInput = document.querySelector('input[name="name"]');
            if (nameInput) nameInput.addEventListener('input', e => formInputValues.name = e.target.value);

            const phoneInput = document.querySelector('input[name="phone"]');
            if (phoneInput) phoneInput.addEventListener('input', e => formInputValues.phone = e.target.value);

            const qqInput = document.querySelector('input[name="qq"]');
            if (qqInput) qqInput.addEventListener('input', e => formInputValues.qq = e.target.value);

            document.querySelectorAll('input[name="has_experience"]').forEach(radio => {
                radio.addEventListener('change', function () {
                    formInputValues.has_experience = this.value;
                });
            });
        }

        // 报名提交逻辑
        document.getElementById("regForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector("button");
            btn.disabled = true;
            btn.textContent = "提交中...";

            const formData = new FormData(e.target);
            const qq = formData.get('qq');
            if (!/^\d+$/.test(qq)) {
                showToast("QQ号必须是纯数字！", 'warning');
                btn.disabled = false;
                btn.textContent = "提交报名";
                return;
            }

            try {
                const res = await fetch("/api/reg", { method: "POST", body: formData });
                let data;
                if (res.ok) {
                    data = await res.json();
                    showToast(data.msg || "报名成功", 'success');

                    if (data.qq_group) {
                        showQQGroupModal(data.qq_group, data.video_url);
                    }

                    // 报名成功后清空保存的状态
                    selectedExamId = '';
                    formInputValues = {
                        student_id: '',
                        name: '',
                        phone: '',
                        qq: '',
                        has_experience: 'false'
                    };
                    e.target.reset(); // 清空表单
                    loadExamList();
                } else {
                    const errData = await res.json();
                    showToast(errData.detail || "报名失败", 'danger');
                    data = errData;
                }
            } catch (err) {
                showToast("网络错误，请重试", 'danger');
                console.error("报名失败:", err);
            } finally {
                btn.disabled = false;
                btn.textContent = "提交报名";
            }
        });

        // 查询我的报名
        document.getElementById("myRegForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = "查询中...";

            const formData = new FormData();
            formData.append("student_id", document.getElementById("myStudentId").value);
            formData.append("phone", document.getElementById("myPhone").value);

            try {
                const res = await fetch("/api/my-registrations", { method: "POST", body: formData });
                const data = await res.json();
                if (data.code === 0) {
                    const container = document.getElementById("myList");
                    container.innerHTML = "";

                    if (data.data.length === 0) {
                        const div = document.createElement("div");
                        div.className = "alert alert-info text-center py-3 mb-0";
                        div.textContent = "暂无报名记录";
                        container.appendChild(div);
                    } else {
                        const count = data.data.length;
                        const header = document.createElement("div");
                        header.className = "mb-3 fw-bold";
                        header.innerHTML = `查询到你有 <span class="text-primary">${count}</span> 个成功报名项目：`;
                        container.appendChild(header);

                        const ol = document.createElement("ol");
                        ol.className = "list-group list-group-numbered mb-3";

                        data.data.forEach((item) => {
                            const li = document.createElement("li");
                            li.className = "list-group-item";

                            const row1 = document.createElement("div");
                            row1.className = "row mb-2";
                            const r1c1 = document.createElement("div");
                            r1c1.className = "col-3 text-muted small";
                            r1c1.textContent = "考试项目";
                            const r1c2 = document.createElement("div");
                            r1c2.className = "col-9 fw-bold";
                            r1c2.textContent = item.exam_name;
                            row1.appendChild(r1c1);
                            row1.appendChild(r1c2);
                            li.appendChild(row1);

                            const row2 = document.createElement("div");
                            row2.className = "row mb-1";
                            const r2c1 = document.createElement("div");
                            r2c1.className = "col-3 text-muted small";
                            r2c1.textContent = "报名时间";
                            const r2c2 = document.createElement("div");
                            r2c2.className = "col-9";
                            r2c2.textContent = item.create_time;
                            row2.appendChild(r2c1);
                            row2.appendChild(r2c2);
                            li.appendChild(row2);

                            const row3 = document.createElement("div");
                            row3.className = "row mb-2";
                            const r3c1 = document.createElement("div");
                            r3c1.className = "col-3 text-muted small";
                            r3c1.textContent = "QQ号";
                            const r3c2 = document.createElement("div");
                            r3c2.className = "col-9";
                            r3c2.textContent = item.qq;
                            row3.appendChild(r3c1);
                            row3.appendChild(r3c2);
                            li.appendChild(row3);

                            // 考务QQ群号
                            if (item.qq_group) {
                                const rowGroup = document.createElement("div");
                                rowGroup.className = "row mb-2";
                                const rgc1 = document.createElement("div");
                                rgc1.className = "col-3 text-muted small";
                                rgc1.textContent = "考务群";
                                const rgc2 = document.createElement("div");
                                rgc2.className = "col-9";
                                const span = document.createElement("span");
                                span.style.color = "#e67e22";
                                span.textContent = `📢 请加群：${item.qq_group}`;
                                rgc2.appendChild(span);
                                rowGroup.appendChild(rgc1);
                                rowGroup.appendChild(rgc2);
                                li.appendChild(rowGroup);
                            }

                            // 观看视频链接
                            const videoLink = document.createElement("a");
                            videoLink.href = "#";
                            videoLink.className = "btn btn-outline-primary btn-sm me-2";
                            videoLink.textContent = "📹 观看视频";
                            videoLink.onclick = function(e) {
                                e.preventDefault();
                                var el = document.getElementById('videoWatchForm');
                                if (el) el.scrollIntoView({ behavior: 'smooth' });
                            };
                            li.appendChild(videoLink);

                            if (item.can_cancel) {
                                const btn = document.createElement("button");
                                btn.className = "btn btn-danger btn-sm";
                                btn.textContent = "取消报名";
                                btn.addEventListener("click", function() {
                                    openCancelModal(item.reg_id, item.recruit_id, item.qq);
                                });
                                li.appendChild(btn);
                            } else {
                                const badge = document.createElement("span");
                                badge.className = "badge bg-secondary";
                                badge.textContent = "已截止，无法取消";
                                li.appendChild(badge);
                            }

                            ol.appendChild(li);
                        });

                        container.appendChild(ol);
                    }

                }
            } catch (err) {
                showToast("查询失败，请重试", 'danger');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "查询";
            }
        });

        // 取消报名弹窗相关
        let currentCancelData = { regId: null, recruitId: null, qq: null };

        const cancelModalInstance = new bootstrap.Modal(document.getElementById('cancelModal'));

        function openCancelModal(regId, recruitId, qq) {
            currentCancelData = { regId, recruitId, qq };
            document.getElementById("cancelRegId").value = regId;
            document.getElementById("verifyCode").value = "";
            cancelModalInstance.show();
        }

        // 发送验证码
        document.getElementById("sendCodeBtn").addEventListener("click", async () => {
            const { regId, recruitId, qq } = currentCancelData;
            const email = `${qq}@qq.com`;
            const btn = document.getElementById("sendCodeBtn");

            btn.disabled = true;
            btn.textContent = "发送中...";

            const formData = new FormData();
            formData.append("reg_id", regId);
            formData.append("recruit_id", recruitId);
            formData.append("email", email);

            try {
                const res = await fetch("/api/send-verify-code", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                if (res.ok) {
                    showToast("验证码已发送到你的QQ邮箱，请查收（有效期5分钟）", 'success');
                    let countdown = 60;
                    btn.textContent = `重新发送(${countdown}s)`;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = `重新发送(${countdown}s)`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = "发送验证码到QQ邮箱";
                        }
                    }, 1000);
                } else {
                    showToast(data.detail || "发送验证码失败", 'danger');
                    btn.disabled = false;
                    btn.textContent = "发送验证码到QQ邮箱";
                }
            } catch (err) {
                showToast("网络错误，发送失败", 'danger');
                console.error(err);
                btn.disabled = false;
                btn.textContent = "发送验证码到QQ邮箱";
            }
        });

        // 确认取消报名
        document.getElementById("confirmCancelBtn").addEventListener("click", async () => {
            const regId = currentCancelData.regId;
            const code = document.getElementById("verifyCode").value.trim();
            const btn = document.getElementById("confirmCancelBtn");

            if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
                showToast("请输入正确的6位数字验证码！", 'warning');
                return;
            }

            btn.disabled = true;
            btn.textContent = "处理中...";

            try {
                const formData = new FormData();
                formData.append("reg_id", regId);
                formData.append("verify_code", code);
                const res = await fetch("/api/cancel-reg", {
                    method: "POST",
                    body: formData,
                    credentials: "same-origin"
                });

                if (res.ok) {
                    showToast("取消报名成功！", 'success');
                    cancelModalInstance.hide();
                    document.getElementById("myRegForm").dispatchEvent(new Event('submit'));
                    loadExamList();
                } else {
                    const data = await res.json();
                    showToast(data?.detail || `取消失败（状态码 ${res.status}）`, 'danger');
                }
            } catch (err) {
                showToast("操作失败：" + (err.message || "网络或服务器错误"), 'danger');
            } finally {
                btn.disabled = false;
                btn.textContent = "确认取消";
            }
        });

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initFormInputListener();
            loadExamList();
            loadVideoUrl();
            setInterval(loadExamList, 30000);
        });
    </script>
</body>

</html>
