<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考务工作人员报名 - 考务报名管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css?v=3" rel="stylesheet">
</head>

<body>

    <!-- Toast 提示容器 -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="关闭"></button>
            </div>
        </div>
    </div>

    <header class="header text-center">
        <div class="container">
            <h1 class="mb-3">考务报名管理系统</h1>
            <p class="lead">学生报名入口</p>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="container mt-5 mb-5">
            <div class="tip">
                学号8位数字，手机号11位数字，QQ号纯数字（用于接收取消报名验证码）
            </div>

            <div class="card p-5 mb-4">
                <h3 class="mb-4">报名入口</h3>
            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">考试项目</label>
                    <select name="recruitment_id" id="examSelect" class="form-select" required></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">学号</label>
                    <input type="text" name="student_id" class="form-control" required placeholder="8位数字">
                </div>
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="tel" name="phone" class="form-control" required placeholder="11位数字">
                </div>
                <div class="mb-3">
                    <label class="form-label">QQ号</label>
                    <input type="text" name="qq" class="form-control" required placeholder="纯数字，用于接收验证码">
                </div>
                <div class="mb-3">
                    <label class="form-label d-block">性别</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="男" required checked>
                        <label class="form-check-label">男</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="女" required>
                        <label class="form-check-label">女</label>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label d-block">是否有经验</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="has_experience" value="true" required>
                        <label class="form-check-label">有</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="has_experience" value="false" checked>
                        <label class="form-check-label">无</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-custom w-100">提交报名</button>
            </form>
        </div>
<!-- end regForm card -->

        <div class="card p-5">
            <h3 class="mb-4">查询我的报名记录</h3>
            <form id="myRegForm" class="mb-4">
                <div class="mb-3">
                    <label class="form-label">学号</label>
                    <input type="text" id="myStudentId" class="form-control" placeholder="8位数字学号" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">手机号</label>
                    <input type="text" id="myPhone" class="form-control" placeholder="11位数字手机号" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">查询</button>
            </form>
            <div id="myList"></div>
        </div>

        <!-- 布置任务卡片 -->
        <div class="card p-4 mt-4" id="taskCard" style="display:none;">
            <h3 class="mb-3">📋 我的布置任务</h3>
            <div id="taskList"></div>
        </div>
    </div>

    <!-- 取消报名弹窗 -->
    <div class="modal fade" id="cancelModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">取消报名验证</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="cancelRegId">
                    <div class="mb-3">
                        <label class="form-label">QQ邮箱验证码</label>
                        <input type="text" id="verifyCode" class="form-control" placeholder="输入收到的6位验证码" required>
                    </div>
                    <button type="button" id="sendCodeBtn" class="btn btn-custom w-100 mb-3">发送验证码到QQ邮箱</button>
                    <button type="button" id="confirmCancelBtn" class="btn btn-custom w-100">确认取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 报名成功弹窗 -->
    <div class="modal fade" id="qqGroupModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-body text-center py-4 px-4">
                    <div style="font-size:48px;margin-bottom:12px;">✅</div>
                    <h4 class="mb-2">报名成功！</h4>
                    <p class="text-muted mb-3" id="qqGroupExamName" style="font-size:15px;"></p>

                    <div style="background:#e8f5e9;border-radius:12px;padding:20px;margin-bottom:16px;">
                        <div style="font-size:14px;color:#2e7d32;margin-bottom:12px;">📢 请加入考务工作QQ群</div>
                        <a id="qqGroupJumpLink" href="#" target="_blank" class="btn btn-success btn-lg mb-2">一键加入QQ群</a>
                        <div style="font-size:13px;color:#555;word-break:break-all;">
                            加群链接：<span id="qqGroupLinkText" style="color:#0d6efd;"></span>
                        </div>
                    </div>
                    <button type="button" id="qqGroupDismissBtn" class="btn btn-custom px-5">知道了</button>
                </div>
            </div>
        </div>
    </div>

    </div><!-- /content-wrapper -->

    <footer>
        <div class="container">
            <p class="mb-0">© 2026 考务报名管理系统 - 所有权利保留</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toast 提示工具函数
        function showToast(message, type) {
            const toastEl = document.getElementById('toast');
            const toastBody = document.getElementById('toastMessage');
            toastBody.textContent = message;
            toastEl.className = 'toast align-items-center border-0 text-bg-' + (type || 'info');
            bootstrap.Toast.getOrCreateInstance(toastEl).show();
        }

        // ========== QQ群跳转弹窗 ==========
        let qqGroupModalInstance = null;

        function showQQGroupModal(qqGroup) {
            if (!qqGroupModalInstance) {
                qqGroupModalInstance = new bootstrap.Modal(document.getElementById('qqGroupModal'), { backdrop: 'static', keyboard: false });
            }

            const examSelect = document.getElementById('examSelect');
            const selectedOpt = examSelect.options[examSelect.selectedIndex];
            const examName = selectedOpt ? selectedOpt.textContent.split('（')[0] : '';
            document.getElementById('qqGroupExamName').textContent = `「${examName}」`;
            document.getElementById('qqGroupJumpLink').href = qqGroup;
            document.getElementById('qqGroupLinkText').textContent = qqGroup;

            qqGroupModalInstance.show();
        }

        // 弹窗关闭按钮
        document.getElementById('qqGroupDismissBtn').addEventListener('click', function() {
            if (qqGroupModalInstance) qqGroupModalInstance.hide();
        });

        // 全局变量保存用户已选中的考试ID和表单输入值
        let selectedExamId = '';
        let formInputValues = {
            student_id: '',
            name: '',
            phone: '',
            qq: '',
            gender: '男',
            has_experience: 'false'
        };

        // 修复：优化loadExamList，保留用户输入状态
        async function loadExamList() {
            try {
                const res = await fetch("/api/recruit/list");
                const list = await res.json();
                const select = document.getElementById("examSelect");

                // 1. 保存当前选中状态（刷新前）
                const currentSelectedId = select.value || selectedExamId;

                // 2. 刷新下拉框选项
                select.innerHTML = "<option value=''>请选择考试</option>";
                list.forEach(item => {
                    const opt = document.createElement("option");
                    opt.value = item.id;
                    opt.textContent = `${item.exam_name}（需${item.need_num}人/剩${item.remaining}人，截止：${item.end_time}）`;
                    select.appendChild(opt);
                });

                // 3. 恢复选中状态（如果该考试仍存在）
                if (currentSelectedId) {
                    const optionExists = Array.from(select.options).some(opt => opt.value === currentSelectedId);
                    if (optionExists) {
                        select.value = currentSelectedId;
                        selectedExamId = currentSelectedId;
                    } else {
                        // 考试已被删除/关闭，提示用户
                        selectedExamId = '';
                        showToast("你选中的考试项目已失效，请重新选择", 'warning');
                    }
                }

                // 4. 恢复表单输入值
                document.querySelector('input[name="student_id"]').value = formInputValues.student_id;
                document.querySelector('input[name="name"]').value = formInputValues.name;
                document.querySelector('input[name="phone"]').value = formInputValues.phone;
                document.querySelector('input[name="qq"]').value = formInputValues.qq;
                document.querySelector(`input[name="has_experience"][value="${formInputValues.has_experience}"]`).checked = true;
                document.querySelector(`input[name="gender"][value="${formInputValues.gender}"]`).checked = true;

            } catch (err) {
                console.error("加载考试列表失败:", err);
                showToast("加载考试列表失败，请刷新页面", 'danger');
            }
        }

        // 修复：监听表单输入，实时保存值
        function initFormInputListener() {
            const examSelect = document.getElementById("examSelect");
            if (examSelect) {
                examSelect.addEventListener('change', function () {
                    selectedExamId = this.value;
                });
            } else {
                console.warn("未找到 #examSelect");
            }

            const studentIdInput = document.querySelector('input[name="student_id"]');
            if (studentIdInput) studentIdInput.addEventListener('input', e => formInputValues.student_id = e.target.value);

            const nameInput = document.querySelector('input[name="name"]');
            if (nameInput) nameInput.addEventListener('input', e => formInputValues.name = e.target.value);

            const phoneInput = document.querySelector('input[name="phone"]');
            if (phoneInput) phoneInput.addEventListener('input', e => formInputValues.phone = e.target.value);

            const qqInput = document.querySelector('input[name="qq"]');
            if (qqInput) qqInput.addEventListener('input', e => formInputValues.qq = e.target.value);

            document.querySelectorAll('input[name="has_experience"]').forEach(radio => {
                radio.addEventListener('change', function () {
                    formInputValues.has_experience = this.value;
                });
            });

            document.querySelectorAll('input[name="gender"]').forEach(radio => {
                radio.addEventListener('change', function () {
                    formInputValues.gender = this.value;
                });
            });
        }

        // 报名提交逻辑
        document.getElementById("regForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const btn = e.target.querySelector("button");
            btn.disabled = true;
            btn.textContent = "提交中...";

            const formData = new FormData(e.target);
            const qq = formData.get('qq');
            if (!/^\d+$/.test(qq)) {
                showToast("QQ号必须是纯数字！", 'warning');
                btn.disabled = false;
                btn.textContent = "提交报名";
                return;
            }

            try {
                const res = await fetch("/api/reg", { method: "POST", body: formData });
                let data;
                if (res.ok) {
                    data = await res.json();
                    showToast(data.msg || "报名成功", 'success');

                    if (data.qq_group) {
                        showQQGroupModal(data.qq_group);
                    }

                    // 报名成功后清空保存的状态
                    selectedExamId = '';
                    formInputValues = {
                        student_id: '',
                        name: '',
                        phone: '',
                        qq: '',
                        has_experience: 'false'
                    };
                    e.target.reset(); // 清空表单
                    loadExamList();
                } else {
                    const errData = await res.json();
                    showToast(errData.detail || "报名失败", 'danger');
                    data = errData;
                }
            } catch (err) {
                showToast("网络错误，请重试", 'danger');
                console.error("报名失败:", err);
            } finally {
                btn.disabled = false;
                btn.textContent = "提交报名";
            }
        });

        // 查询我的报名
        document.getElementById("myRegForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = "查询中...";

            const formData = new FormData();
            formData.append("student_id", document.getElementById("myStudentId").value);
            formData.append("phone", document.getElementById("myPhone").value);

            try {
                const res = await fetch("/api/my-registrations", { method: "POST", body: formData });
                const data = await res.json();
                if (data.code === 0) {
                    const container = document.getElementById("myList");
                    container.innerHTML = "";

                    if (data.data.length === 0) {
                        const div = document.createElement("div");
                        div.className = "alert alert-info text-center py-3 mb-0";
                        div.textContent = "暂无报名记录";
                        container.appendChild(div);
                    } else {
                        const count = data.data.length;
                        const header = document.createElement("div");
                        header.className = "mb-3 fw-bold";
                        header.innerHTML = `查询到你有 <span class="text-primary">${count}</span> 个成功报名项目：`;
                        container.appendChild(header);

                        const ol = document.createElement("ol");
                        ol.className = "list-group list-group-numbered mb-3";

                        data.data.forEach((item) => {
                            const li = document.createElement("li");
                            li.className = "list-group-item";

                            const row1 = document.createElement("div");
                            row1.className = "row mb-2";
                            const r1c1 = document.createElement("div");
                            r1c1.className = "col-3 text-muted small";
                            r1c1.textContent = "考试项目";
                            const r1c2 = document.createElement("div");
                            r1c2.className = "col-9 fw-bold";
                            r1c2.textContent = item.exam_name;
                            row1.appendChild(r1c1);
                            row1.appendChild(r1c2);
                            li.appendChild(row1);

                            const row2 = document.createElement("div");
                            row2.className = "row mb-1";
                            const r2c1 = document.createElement("div");
                            r2c1.className = "col-3 text-muted small";
                            r2c1.textContent = "报名时间";
                            const r2c2 = document.createElement("div");
                            r2c2.className = "col-9";
                            r2c2.textContent = item.create_time;
                            row2.appendChild(r2c1);
                            row2.appendChild(r2c2);
                            li.appendChild(row2);

                            const row3 = document.createElement("div");
                            row3.className = "row mb-2";
                            const r3c1 = document.createElement("div");
                            r3c1.className = "col-3 text-muted small";
                            r3c1.textContent = "QQ号";
                            const r3c2 = document.createElement("div");
                            r3c2.className = "col-9";
                            r3c2.textContent = item.qq;
                            row3.appendChild(r3c1);
                            row3.appendChild(r3c2);
                            li.appendChild(row3);

                            // 性别
                            const rowGender = document.createElement("div");
                            rowGender.className = "row mb-1";
                            const rgc1 = document.createElement("div");
                            rgc1.className = "col-3 text-muted small";
                            rgc1.textContent = "性别";
                            const rgc2 = document.createElement("div");
                            rgc2.className = "col-9";
                            rgc2.textContent = item.gender || "男";
                            rowGender.appendChild(rgc1);
                            rowGender.appendChild(rgc2);
                            li.appendChild(rowGender);

                            // 考务QQ加群链接
                            if (item.qq_group) {
                                const rowGroup = document.createElement("div");
                                rowGroup.className = "row mb-2";
                                const rgc1 = document.createElement("div");
                                rgc1.className = "col-3 text-muted small";
                                rgc1.textContent = "考务群";
                                const rgc2 = document.createElement("div");
                                rgc2.className = "col-9";
                                const jumpLink = document.createElement("a");
                                jumpLink.href = item.qq_group;
                                jumpLink.target = "_blank";
                                jumpLink.className = "btn btn-success btn-sm me-2";
                                jumpLink.textContent = "一键加群";
                                rgc2.appendChild(jumpLink);
                                const linkInfo = document.createElement("span");
                                linkInfo.style.color = "#6c757d";
                                linkInfo.style.fontSize = "12px";
                                linkInfo.textContent = item.qq_group;
                                rgc2.appendChild(linkInfo);
                                rowGroup.appendChild(rgc1);
                                rowGroup.appendChild(rgc2);
                                li.appendChild(rowGroup);
                            }

                            if (item.can_cancel) {
                                const btn = document.createElement("button");
                                btn.className = "btn btn-danger btn-sm";
                                btn.textContent = "取消报名";
                                btn.addEventListener("click", function() {
                                    openCancelModal(item.reg_id, item.recruit_id, item.qq);
                                });
                                li.appendChild(btn);
                            } else {
                                const badge = document.createElement("span");
                                badge.className = "badge bg-secondary";
                                badge.textContent = "已截止，无法取消";
                                li.appendChild(badge);
                            }

                            ol.appendChild(li);
                        });

                        container.appendChild(ol);
                    }

                    // 加载布置任务
                    loadMyTasks(document.getElementById("myStudentId").value, document.getElementById("myPhone").value);

                }
            } catch (err) {
                showToast("查询失败，请重试", 'danger');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "查询";
            }
        });

        // 取消报名弹窗相关
        let currentCancelData = { regId: null, recruitId: null, qq: null };

        const cancelModalInstance = new bootstrap.Modal(document.getElementById('cancelModal'));

        function openCancelModal(regId, recruitId, qq) {
            currentCancelData = { regId, recruitId, qq };
            document.getElementById("cancelRegId").value = regId;
            document.getElementById("verifyCode").value = "";
            cancelModalInstance.show();
        }

        // 发送验证码
        document.getElementById("sendCodeBtn").addEventListener("click", async () => {
            const { regId, recruitId, qq } = currentCancelData;
            const email = `${qq}@qq.com`;
            const btn = document.getElementById("sendCodeBtn");

            btn.disabled = true;
            btn.textContent = "发送中...";

            const formData = new FormData();
            formData.append("reg_id", regId);
            formData.append("recruit_id", recruitId);
            formData.append("email", email);

            try {
                const res = await fetch("/api/send-verify-code", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                if (res.ok) {
                    showToast("验证码已发送到你的QQ邮箱，请查收（有效期5分钟）", 'success');
                    let countdown = 60;
                    btn.textContent = `重新发送(${countdown}s)`;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = `重新发送(${countdown}s)`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btn.disabled = false;
                            btn.textContent = "发送验证码到QQ邮箱";
                        }
                    }, 1000);
                } else {
                    showToast(data.detail || "发送验证码失败", 'danger');
                    btn.disabled = false;
                    btn.textContent = "发送验证码到QQ邮箱";
                }
            } catch (err) {
                showToast("网络错误，发送失败", 'danger');
                console.error(err);
                btn.disabled = false;
                btn.textContent = "发送验证码到QQ邮箱";
            }
        });

        // 确认取消报名
        document.getElementById("confirmCancelBtn").addEventListener("click", async () => {
            const regId = currentCancelData.regId;
            const code = document.getElementById("verifyCode").value.trim();
            const btn = document.getElementById("confirmCancelBtn");

            if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
                showToast("请输入正确的6位数字验证码！", 'warning');
                return;
            }

            btn.disabled = true;
            btn.textContent = "处理中...";

            try {
                const formData = new FormData();
                formData.append("reg_id", regId);
                formData.append("verify_code", code);
                const res = await fetch("/api/cancel-reg", {
                    method: "POST",
                    body: formData,
                    credentials: "same-origin"
                });

                if (res.ok) {
                    showToast("取消报名成功！", 'success');
                    cancelModalInstance.hide();
                    document.getElementById("myRegForm").dispatchEvent(new Event('submit'));
                    loadExamList();
                } else {
                    const data = await res.json();
                    showToast(data?.detail || `取消失败（状态码 ${res.status}）`, 'danger');
                }
            } catch (err) {
                showToast("操作失败：" + (err.message || "网络或服务器错误"), 'danger');
            } finally {
                btn.disabled = false;
                btn.textContent = "确认取消";
            }
        });

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            initFormInputListener();
            loadExamList();
            setInterval(loadExamList, 30000);
        });
        // ========== 布置任务 ==========

        async function loadMyTasks(studentId, phone) {
            const card = document.getElementById('taskCard');
            const container = document.getElementById('taskList');

            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('phone', phone);

            try {
                const res = await fetch('/api/my-tasks', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.code !== 0 || !data.data || data.data.length === 0) {
                    card.style.display = 'none';
                    return;
                }

                card.style.display = 'block';
                let html = data.zone_name ? `<div class="mb-2 text-muted small">🏢 ${data.zone_name}</div>` : '';

                data.data.forEach(item => {
                    const examNos = item.exam_numbers.join('、');
                    html += `<div class="card border mb-3">
                <div class="card-header d-flex justify-content-between align-items-center py-2">
                    <span class="fw-bold">🏫 ${item.classroom_name}（${examNos}考场）</span>
                    <span class="badge ${item.all_done ? 'bg-success' : 'bg-warning text-dark'}">${item.progress}</span>
                </div>
                <div class="card-body py-2">`;

                    item.tasks.forEach(t => {
                        if (t.is_auto_skip) {
                            html += `<div class="d-flex align-items-center mb-1 text-muted">
                        <span style="width:24px;">⏭️</span>
                        <span class="small">${t.item_name}</span>
                    </div>`;
                        } else {
                            const checked = t.is_completed ? 'checked' : '';
                            const deco = t.is_completed ? 'text-decoration:line-through' : '';
                            html += `<div class="form-check mb-1">
                        <input class="form-check-input task-checkbox" type="checkbox" data-task-id="${t.id}" ${checked}>
                        <label class="form-check-label small" style="${deco}">${t.item_name}</label>
                    </div>`;
                        }
                    });

                    html += `</div></div>`;
                });

                container.innerHTML = html;

                // 绑定复选框事件
                container.querySelectorAll('.task-checkbox').forEach(cb => {
                    cb.addEventListener('change', async function() {
                        const taskId = this.dataset.taskId;
                        const label = this.nextElementSibling;
                        try {
                            const res = await fetch(`/api/tasks/${taskId}/toggle`, { method: 'POST' });
                            const data = await res.json();
                            if (data.code === 0) {
                                label.style.textDecoration = data.is_completed ? 'line-through' : 'none';
                                // 刷新进度
                                setTimeout(() => loadMyTasks(studentId, phone), 500);
                            }
                        } catch (err) {
                            this.checked = !this.checked;
                            showToast('操作失败', 'danger');
                        }
                    });
                });
            } catch (err) {
                card.style.display = 'none';
            }
        }
    </script>
</body>

</html>
