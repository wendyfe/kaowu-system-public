<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 考务报名管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        footer {
            background: #2c3e50;
            color: white;
            padding: 1rem 0;
            text-align: center;
            margin-top: auto;
        }

        .error {
            color: #e53e3e;
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 6px;
            background-color: #fef2f2;
            display: none;
        }
    </style>
</head>

<body>

    <header class="header text-center">
        <div class="container">
            <h1 class="mb-3">考务报名管理系统</h1>
            <p class="lead">管理员登录</p>
        </div>
    </header>

    <div class="main-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card p-5">
                        <h3 class="text-center mb-4">管理员登录</h3>
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="form-label">账号</label>
                                <input type="text" name="username" class="form-control" placeholder="请输入管理员账号" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">密码</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="error" id="errorMsg"></div>
                            <button type="submit" class="btn-custom w-100">登录</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p class="mb-0">© 2026 考务报名管理系统 - 所有权利保留</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.style.display = "none";

            const formData = new FormData(e.target);
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = "登录中...";

            try {
                const res = await fetch("/api/admin/login", { method: "POST", body: formData });
                if (res.ok) {
                    window.location.href = "/admin"; // 登录成功跳转管理页
                } else {
                    const data = await res.json();
                    errorMsg.textContent = data.detail || "登录失败";
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "网络错误，请重试";
                errorMsg.style.display = "block";
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "登录";
            }
        });
    </script>
</body>

</html>
