version: '3'

services:
  kaowu-app:
    build: .
    container_name: kaowu-system
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app/db:/app/db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s