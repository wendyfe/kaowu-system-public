version: '3'

services:
  kaowu-app:
    build: .
    container_name: kaowu-system
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app/db:/app/db  # 数据库持久化
    environment:
      - TZ=Asia/Shanghai
      - KAOWU_ADMIN_USERNAME=admin
      - KAOWU_ADMIN_PASSWORD=1234             # 建议改成复杂。密码
      - SMTP_USER=你的QQ或gmail
      - SMTP_PASS=16位专用密码
      - SMTP_HOST=smtp.qq.com
      - SMTP_PORT=465                         # ← 保持 465