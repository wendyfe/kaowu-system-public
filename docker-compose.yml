services:
  kaowu-app:
    build: .
    container_name: kaowu-system
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app/db:/app/db
      - /data/training-videos:/data/training-videos:ro
      - ${BACKUP_REPO_HOST_DIR:-/opt/kaowu-backups}:${BACKUP_REPO_DIR:-/backup-repo}
      - ${BACKUP_GPG_PASSPHRASE_FILE_HOST:-/home/ubuntu/.kaowu-backup-passphrase}:${BACKUP_GPG_PASSPHRASE_FILE:-/run/secrets/kaowu_backup_passphrase}:ro
      - ${BACKUP_SSH_KEY_HOST_PATH:-/home/ubuntu/.ssh/kaowu_backup_github}:${BACKUP_SSH_KEY_PATH:-/run/secrets/kaowu_backup_github}:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
